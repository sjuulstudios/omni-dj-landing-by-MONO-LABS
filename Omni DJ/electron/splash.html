<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<title>Omni DJ</title>
<style>
  html, body { height: 100%; margin: 0; background: #0f0f10; color: #f4f4f5;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    display: flex; align-items: center; justify-content: center; }
  .wrap { text-align: center; padding: 24px; }
  .logo { font-size: 24px; font-weight: 700; letter-spacing: 0.04em; }
  .accent { color: #D97742; }
  .sub { margin-top: 10px; font-size: 13px; color: #a1a1aa; }
  .spin { margin: 24px auto 0; width: 26px; height: 26px;
    border: 3px solid rgba(217,119,66,0.25); border-top-color: #D97742;
    border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .err { display: none; color: #e06b6b; font-size: 12.5px; margin-top: 16px;
    max-width: 380px; line-height: 1.55; }
  .err.show { display: block; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="logo">Omni <span class="accent">DJ</span></div>
    <div class="sub" id="sub">De lokale engine start op...</div>
    <div class="spin" id="spin"></div>
    <div class="err" id="errbox">De backend kon niet starten. Controleer of de venv en app.py bestaan en start vanuit de electron-map met npm start. De terminal-log toont de details.</div>
  </div>
  <script>
    // main.js laadt deze pagina met #error als opstarten faalt.
    if (location.hash === '#error') {
      var e = document.getElementById('errbox'); if (e) e.classList.add('show');
      var s = document.getElementById('spin'); if (s) s.style.display = 'none';
      var sub = document.getElementById('sub'); if (sub) sub.textContent = 'Opstarten mislukt';
    }
  </script>
</body>
</html>
